name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard – no Lovable AI / leaked secrets
        run: |
          echo "Checking for forbidden patterns..."
          FAIL=0
          if grep -r "ai.gateway.lovable.dev" --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' .; then echo "❌ Found ai.gateway.lovable.dev"; FAIL=1; fi
          if grep -r "LOVABLE_API_KEY" --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' .; then echo "❌ Found LOVABLE_API_KEY"; FAIL=1; fi
          if grep -r "google/gemini" --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' .; then echo "❌ Found google/gemini"; FAIL=1; fi
          if git ls-files --error-unmatch .env 2>/dev/null; then echo "❌ .env is tracked by git"; FAIL=1; fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "✅ All guards passed"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --run
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-key
          VITE_SUPABASE_PROJECT_ID: placeholder

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'e2e')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:4173
          E2E_CANDIDATE_EMAIL: ${{ secrets.E2E_CANDIDATE_EMAIL }}
          E2E_CANDIDATE_PASSWORD: ${{ secrets.E2E_CANDIDATE_PASSWORD }}
          E2E_EMPLOYER_EMAIL: ${{ secrets.E2E_EMPLOYER_EMAIL }}
          E2E_EMPLOYER_PASSWORD: ${{ secrets.E2E_EMPLOYER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
